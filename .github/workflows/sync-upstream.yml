name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Save workflow
        run: cp .github/workflows/sync-upstream.yml /tmp/sync-upstream.yml

      - name: Sync upstream
        run: |
          git config user.name "3202336152"
          git config user.email "3202336152@qq.com"
          git remote add upstream https://github.com/MoyuFamily/ai-relay.git
          git fetch upstream
          git reset --hard upstream/main
          mkdir -p .github/workflows
          cp /tmp/sync-upstream.yml .github/workflows/sync-upstream.yml
          git add .github/workflows/sync-upstream.yml
          git commit -m "chore: preserve sync workflow"
          git push origin main --force
